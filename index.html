<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merge RPG</title>
    <style>
        /* 모바일 전체 화면, 스크롤 방지 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a2e;
            /* 터치 시 하이라이트 제거 */
            -webkit-tap-highlight-color: transparent;
            /* 텍스트 선택 방지 */
            -webkit-user-select: none;
            user-select: none;
        }
        #game-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <!-- Phaser 3.80.1 (안정 버전 고정) -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script src="js/config.js"></script>
    
    <!-- Phase 3-1: 영속 저장 -->
    <script src="js/GameData.js"></script>
    <script src="js/SaveManager.js"></script>
    <script src="js/EventBus.js"></script>
    
    <!-- 게임 오브젝트 -->
    <script src="js/Block.js"></script>
    <script src="js/BoardManager.js"></script>
    <script src="js/QueueManager.js"></script>
    <script src="js/CombatManager.js"></script>
    <script src="js/ChemistryManager.js"></script>
    <script src="js/StageManager.js"></script>
    <script src="js/InventoryManager.js"></script>
    <script src="js/InventoryUI.js"></script>
    <script src="js/ChemistryBookUI.js"></script>
    <script src="js/RetryManager.js"></script>
    <script src="js/RetryDialogUI.js"></script>
    <script src="js/TutorialManager.js"></script>
    <script src="js/TutorialDialogUI.js"></script>
    
    <!-- Phase 3-3: 로비 UI 컴포넌트 -->
    <script src="js/ui/TopHud.js"></script>
    <script src="js/ui/TabBar.js"></script>
    <script src="js/ui/Toast.js"></script>
    
    <!-- Phase 3-3: 로비 탭 컴포넌트 -->
    <script src="js/LobbyVillage.js"></script>
    <script src="js/tabs/PlaceholderTab.js"></script>
    <script src="js/tabs/VillageTab.js"></script>
    <script src="js/tabs/DungeonTab.js"></script>
    
    <!-- 게임 씬 -->
    <script src="js/DungeonScene.js"></script>
    <script src="js/LobbyScene.js"></script>
    
    <script src="js/main.js"></script>
</body>
</html>
